# monitoring/prometheus.yml
# ============================================================
# Prometheus scrape configuration for the Enterprise Platform
# Usage: prometheus --config.file=monitoring/prometheus.yml
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    platform: 'enterprise-decision-intelligence'
    environment: 'production'

# ── Alerting ──────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Alert rules ───────────────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# ── Scrape configs ────────────────────────────────────────────
scrape_configs:

  # Platform application metrics
  - job_name: 'platform'
    static_configs:
      - targets: ['app:9090']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # FastAPI application via Prometheus middleware
  - job_name: 'platform_api'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Redis exporter (if Redis is enabled)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
