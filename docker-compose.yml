# ============================================================
# docker-compose.yml — Enterprise Stack
# ============================================================
# Default:  SQLite  — docker compose up app
# Full:     Postgres — docker compose --profile full up
# ============================================================

version: "3.9"

services:

  # ── Main Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: decision-intelligence:latest
    container_name: decision-intelligence
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///storage/enterprise_maas.db
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL (optional — activate with --profile full) ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: decision-intelligence-db
    profiles: ["full"]
    environment:
      POSTGRES_DB:       enterprise_maas
      POSTGRES_USER:     maas_user
      POSTGRES_PASSWORD: maas_pass_change_me
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maas_user -d enterprise_maas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App with PostgreSQL (activate with --profile full) ─────────────────────
  app-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    image: decision-intelligence:latest
    container_name: decision-intelligence-pg
    profiles: ["full"]
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://maas_user:maas_pass_change_me@postgres:5432/enterprise_maas
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
