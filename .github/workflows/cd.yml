# .github/workflows/cd.yml
# ================================================================
# Continuous Deployment — Enterprise Decision Intelligence Platform
# Triggers: push to main (staging), release tags (production)
# ================================================================

name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false    # never cancel a production deploy

env:
  REGISTRY:    ghcr.io
  IMAGE_NAME:  ${{ github.repository }}

jobs:
  # ── Build & Push image ────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-22.04
    needs: build-push
    environment:
      name: staging
      url: https://staging.decision-intelligence.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/decision-intelligence
            docker pull ${{ needs.build-push.outputs.image-tag }}
            docker compose up -d --no-build
            docker system prune -f

      - name: Run smoke tests on staging
        run: |
          sleep 30
          curl -f https://staging.decision-intelligence.example.com/api/v1/health || exit 1
          echo "Staging smoke test passed"

  # ── Deploy to Production ──────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-22.04
    needs: [build-push, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://decision-intelligence.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production (blue/green)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/decision-intelligence
            # Pull new image
            docker pull ${{ needs.build-push.outputs.image-tag }}
            # Start green instance on alternate port
            docker run -d --name app_green \
              -p 8502:8501 \
              --env-file .env.production \
              ${{ needs.build-push.outputs.image-tag }}
            sleep 20
            # Health check green
            curl -f http://localhost:8502/api/v1/health && \
              docker stop app_blue || true && \
              docker rename app_blue app_blue_old || true && \
              docker rename app_green app_blue && \
              docker rm app_blue_old || true

      - name: Tag release in monitoring
        run: |
          curl -X POST "${{ secrets.GRAFANA_URL }}/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Release ${{ github.ref_name }}\", \"tags\": [\"deployment\"]}" || true

      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":rocket: *${{ github.ref_name }}* deployed to production successfully.",
              "channel": "#deployments"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
