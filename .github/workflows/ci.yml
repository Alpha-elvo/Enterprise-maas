# .github/workflows/ci.yml
# ================================================================
# Continuous Integration — Enterprise Decision Intelligence Platform
# Triggers: push to any branch, pull requests to main/develop
# ================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.0"

jobs:
  # ── Lint & Format ─────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black mypy types-requests

      - name: Run ruff (linter)
        run: ruff check . --output-format=github

      - name: Run black (formatter check)
        run: black --check --diff .

      - name: Run mypy (type checker)
        run: mypy . --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # type errors are warnings only

  # ── Unit Tests ────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install base dependencies
        run: pip install -r requirements.txt

      - name: Install enterprise dependencies
        run: pip install -r requirements_enterprise.txt
        continue-on-error: true   # some packages optional

      - name: Install test tools
        run: pip install pytest pytest-cov pytest-timeout

      - name: Create .env for tests
        run: |
          cp .env.example .env
          echo "GROQ_API_KEY=test-key-ci" >> .env
          echo "SECRET_KEY=ci-test-secret-key-minimum-32chars-long" >> .env

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ \
            --timeout=60 \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit="tests/*,*/__pycache__/*" \
            -v
        env:
          GROQ_API_KEY: test-key-ci
          SECRET_KEY: ci-test-secret-key-minimum-32chars-long

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          name: py${{ matrix.python-version }}
        continue-on-error: true

  # ── Integration Tests ─────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-22.04
    needs: test
    if: github.event_name == 'pull_request'

    services:
      sqlite:
        image: alpine:latest   # SQLite is file-based, no service needed

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install all dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements_enterprise.txt

      - name: Run setup script
        run: |
          chmod +x setup.sh
          bash setup.sh
        env:
          GROQ_API_KEY: test-key-integration

      - name: Validate database schema
        run: |
          python -c "
          from storage.database import Database
          from storage.auth_db import AuthDatabase
          from storage.workflow_db import WorkflowDatabase
          db1 = Database()
          db2 = AuthDatabase()
          db3 = WorkflowDatabase()
          print('All database schemas initialised OK')
          "

  # ── Build Docker image ────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: decision-intelligence:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker healthcheck
        run: |
          docker run --rm -d \
            -e GROQ_API_KEY=test \
            -e SECRET_KEY=ci-test-secret-32chars-minimum \
            --name ci_test \
            decision-intelligence:${{ github.sha }} &
          sleep 15
          docker exec ci_test curl -f http://localhost:8501/_stcore/health || true
          docker stop ci_test || true
